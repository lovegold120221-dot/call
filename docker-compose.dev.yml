version: '3.8'

services:
  csr-agent:
    build: 
      context: ./frontend
      dockerfile: ../frontend/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080
    networks:
      - csr-network

  csr-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env
      - ./venv:/app/venv
    environment:
      - NODE_ENV=development
    networks:
      - csr-network
